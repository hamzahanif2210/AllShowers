# =============================================================================
# Example config showing all new features added to AllShowers.
#
# Run with:  python allshowers/train.py conf/example_advanced.yaml
# Generate:  python allshowers/generator.py --run-dir <result_dir> \
#                --solver euler --num-timesteps 20
# =============================================================================

run_name: Example-Advanced


# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  path: /path/to/your/showers.h5

  # Energy transform: log-normalise then standardise
  samples_energy_trafo:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]

  # XY coordinate transform
  samples_coordinate_trafo:
    - [StandardScaler, {shape: [1, 1, 2]}]

  # Conditioning (incident energy) transform
  cond_trafo:
    - [Log, {alpha: 0.0}]
    - [StandardScaler, {shape: [1, 1]}]

  # Optional arrival-time feature (set dim_inputs[0]: 4 to enable)
  samples_time_trafo:
    - [Log, {alpha: 1.0e-6}]
    - [StandardScaler, {shape: [1, 1]}]

  return_noise: true
  return_direction: true
  val_len: 10000
  num_layers: 24      # copied from model.num_layers automatically by train.py


# ---------------------------------------------------------------------------
# Model — original Transformer with flash attention
# ---------------------------------------------------------------------------
model:
  # ---- input / output ----
  dim_inputs: [4, 6, 4]    # [point_features, cond_features + angles, ...]
  num_layers: 24            # number of calorimeter layers (used for layer embedding)
  num_particles: 2          # number of particle species (label embedding)

  # ---- architecture ----
  dim_embedding: 128
  num_head: 8
  num_blocks: 6
  dim_feedforward: 512
  num_points_cond: 512      # 0 = disable num-points conditioning MLP
  activation: GELU
  num_layer_cond: 4         # local-layer context window (-1 = full)
  identity_init: true       # zero-init output head for stable early training

  # ---- attention backend ----
  # "flex"         — default, uses torch.nn.attention.flex_attention + BlockMask
  #                  (supports structured sparsity via num_layer_cond)
  # "flash"        — flash_attn_func, fastest on Ampere/Hopper GPUs,
  #                  no mask (padding handled by loss masking in train.py)
  # "flash-varlen" — flash_attn_varlen_func, packs variable-length sequences,
  #                  uses boolean padding_mask; eliminates wasted compute on padding
  # "torch"        — scaled_dot_product_attention, CPU/MPS compatible,
  #                  uses boolean padding_mask
  attn_type: flash

  flow_config:
    frequencies: 3          # Fourier time-embedding frequencies
    solver: heun             # default ODE solver used at sample time


# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
train:
  num_epochs: 200
  batch_size: 512
  learning_rate: 1.0e-3
  optimizer: Ranger          # Adam | AdamW | SGD | Ranger
  scheduler: CosineWarmup    # null | Step | Exponential | OneCycle | Cosine | CosineWarmup
  weight_decay: 1.0e-2
  grad_clip: 0.2
  grad_accum: 1              # gradient accumulation steps


# ---------------------------------------------------------------------------
# EMA — Exponential Moving Average of model weights
#
# EMAOptimizer is a drop-in replacement for any torch optimizer.
# To use it, wrap the optimizer created in train.py::configure_optimizer:
#
#   from allshowers.ema import EMAOptimizer
#   self.optimizer = EMAOptimizer(
#       self.optimizer,
#       device=self.device,
#       decay=ema.decay,
#       every_n_steps=ema.every_n_steps,
#       ema_start_step=ema.ema_start_step,
#   )
#
# Then evaluate with:
#   with self.optimizer.swap_ema_weights():
#       val_loss = evaluate(model)
# ---------------------------------------------------------------------------
ema:
  decay: 0.9999
  every_n_steps: 1
  ema_start_step: 1000      # wait N steps before starting EMA accumulation
  cpu_offload: false        # store EMA params on CPU to save GPU memory


